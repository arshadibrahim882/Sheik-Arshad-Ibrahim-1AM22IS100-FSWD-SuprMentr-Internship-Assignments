<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - Do App</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        h1 {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #007BFF;
            color: white;
        }
        button:hover {
            background: #0056b3;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li span {
            flex: 1;
            text-align: left;
            cursor: pointer;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
        .footer {
            margin-top: 15px;
        }
        #Clear {
            background: red;
        }
        #Clear:hover {
            background: darkred;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>To Do List</h1>

        <div class="input">
            <input type="text" id="taskInput" placeholder="Enter the task">
            <button id="Add">Add Task</button>
        </div>

        <br>

        <ul id="taskList"></ul>

        <div class="footer">
            <span id="taskcount">0 tasks</span>
            <button id="Clear">Clear All</button>
        </div>
    </div>

    <script src="/Session 8/todo/script.js"></script>

</body>
</html>
